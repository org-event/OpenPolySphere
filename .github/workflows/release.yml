name: Release

# New product version — only when you push an explicit version tag.
# Merging to main runs CI only; it does not publish a release.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26
        run: |
          selected=""
          for candidate in /Applications/Xcode_26*.app /Applications/Xcode.app; do
            [[ -d "$candidate" ]] || continue
            sudo xcode-select -s "$candidate/Contents/Developer"
            major=$(xcodebuild -version | awk '/Xcode/ {split($2,a,"."); print a[1]}')
            if [[ "$major" -ge 26 ]]; then
              selected="$candidate"
              break
            fi
          done
          if [[ -z "$selected" ]]; then
            echo "No Xcode 26+ found on runner" >&2
            exit 1
          fi
          echo "Using $selected"
          xcodebuild -version
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: brew install espeak-ng onnxruntime
      - name: Build release
        run: cargo build --release -p translator
      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCH="$(uname -m)"
          NAME="call-translator-${VERSION}-macos-${ARCH}"
          STAGING="dist/${NAME}"
          mkdir -p dist
          rm -rf "$STAGING"
          mkdir -p "$STAGING"

          cp target/release/translator "$STAGING/"
          chmod +x "$STAGING/translator"
          cp -R web "$STAGING/"
          cp .env.example README.md "$STAGING/"
          [[ -f README.ru.md ]] && cp README.ru.md "$STAGING/"
          cp -R target/release/LiveTranslator.app "$STAGING/"
          [[ -f target/release/apple-translate ]] && cp target/release/apple-translate "$STAGING/"

          printf '%s\n' \
            '#!/usr/bin/env bash' \
            'set -euo pipefail' \
            'DIR="$(cd "$(dirname "$0")" && pwd)"' \
            'export CALL_TRANSLATOR_HOME="$DIR"' \
            'export ORT_DYLIB_PATH="${ORT_DYLIB_PATH:-/opt/homebrew/lib/libonnxruntime.dylib}"' \
            'exec "$DIR/translator" "$@"' \
            > "$STAGING/run.sh"
          chmod +x "$STAGING/run.sh"

          printf '%s\n' \
            'brew install espeak-ng onnxruntime' \
            './run.sh setup' \
            './run.sh' \
            'Open http://127.0.0.1:5050' \
            > "$STAGING/INSTALL.txt"

          (cd dist && zip -r "${NAME}.zip" "${NAME}")
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
