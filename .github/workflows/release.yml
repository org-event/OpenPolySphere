name: Release

# New product version — only when you push an explicit version tag.
# Merging to main runs CI only; it does not publish a release.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-macos-arm64:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Select Xcode 26
        run: |
          selected=""
          for candidate in /Applications/Xcode_26*.app /Applications/Xcode.app; do
            [[ -d "$candidate" ]] || continue
            sudo xcode-select -s "$candidate/Contents/Developer"
            major=$(xcodebuild -version | awk '/Xcode/ {split($2,a,"."); print a[1]}')
            if [[ "$major" -ge 26 ]]; then
              selected="$candidate"
              break
            fi
          done
          if [[ -z "$selected" ]]; then
            echo "No Xcode 26+ found on runner" >&2
            exit 1
          fi
          echo "Using $selected"
          xcodebuild -version
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
      - name: Install system dependencies
        run: brew install espeak-ng onnxruntime librsvg create-dmg
      - name: Build release
        run: cargo build --release -p translator
      - name: Package OpenPolySphere.app
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          chmod +x scripts/package-macos-app.sh scripts/build-macos-app-icon.sh
          ./scripts/package-macos-app.sh "$VERSION" dist
      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          generate_release_notes: true
          files: |
            dist/openpolysphere-*-macos-arm64.dmg
            dist/openpolysphere-*-macos-arm64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-macos-x64:
    # macos-13 was retired 2025-12-04; macos-15-intel is the hosted x86_64 runner.
    runs-on: macos-15-intel
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Select Xcode
        run: |
          selected=""
          for candidate in /Applications/Xcode_26*.app /Applications/Xcode_15*.app /Applications/Xcode.app; do
            [[ -d "$candidate" ]] || continue
            sudo xcode-select -s "$candidate/Contents/Developer"
            selected="$candidate"
            break
          done
          if [[ -n "$selected" ]]; then
            echo "Using $selected"
          fi
          xcodebuild -version
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
      - name: Install system dependencies
        run: brew install espeak-ng onnxruntime librsvg create-dmg
      - name: Build release
        run: cargo build --release -p translator
      - name: Package OpenPolySphere.app
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          chmod +x scripts/package-macos-app.sh scripts/build-macos-app-icon.sh
          ./scripts/package-macos-app.sh "$VERSION" dist
      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          files: |
            dist/openpolysphere-*-macos-x64.dmg
            dist/openpolysphere-*-macos-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      ORT_VERSION: "1.20.1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Cache vcpkg (OpenBLAS)
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            C:\vcpkg\installed\x64-windows-static
            C:\vcpkg\b\d
          key: vcpkg-openblas-static-${{ hashFiles('.github/workflows/release.yml') }}
          restore-keys: |
            vcpkg-openblas-static-

      - name: Install OpenBLAS (vcpkg)
        run: |
          vcpkg install openblas:x64-windows-static
          vcpkg integrate install
          echo "CMAKE_INCLUDE_PATH=$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows-static/include/openblas" >> $env:GITHUB_ENV
          echo "CMAKE_LIBRARY_PATH=$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows-static/lib" >> $env:GITHUB_ENV

      - name: Install espeak-ng
        run: choco install espeak-ng -y

      - name: Install ONNX Runtime
        shell: pwsh
        run: |
          $zip = "onnxruntime-win-x64-$env:ORT_VERSION.zip"
          if (-not (Test-Path "ort/onnxruntime-win-x64-$env:ORT_VERSION/lib/onnxruntime.dll")) {
            Invoke-WebRequest -Uri "https://github.com/microsoft/onnxruntime/releases/download/v$env:ORT_VERSION/$zip" -OutFile $zip
            Expand-Archive $zip -DestinationPath ort -Force
          }

      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build release
        run: cargo build --release -p translator

      - name: Package
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}".Substring(1)
          & ./scripts/package-windows.ps1 -Version $VERSION -OutDir dist

      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          files: |
            dist/openpolysphere-*-windows-x64.zip
            dist/openpolysphere-*-windows-x64-setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ORT_VERSION: "1.20.1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libopenblas-dev libasound2-dev espeak-ng

      - name: Install ONNX Runtime
        run: |
          ORT_DIR="ort/onnxruntime-linux-x64-${ORT_VERSION}"
          if [ ! -f "$ORT_DIR/lib/libonnxruntime.so" ]; then
            mkdir -p ort
            curl -fsSL -o ort.tgz \
              "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-linux-x64-${ORT_VERSION}.tgz"
            tar -xzf ort.tgz -C ort
            rm -f ort.tgz
          fi
          echo "ORT_DYLIB_PATH=$GITHUB_WORKSPACE/$ORT_DIR/lib/libonnxruntime.so" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$GITHUB_WORKSPACE/$ORT_DIR/lib" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable

      - name: Build release
        run: cargo build --release -p translator

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          chmod +x scripts/package-linux.sh
          ./scripts/package-linux.sh "$VERSION" dist

      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          files: |
            dist/openpolysphere-*-linux-x64.zip
            dist/openpolysphere_*_amd64.deb
            dist/openpolysphere-*-*.x86_64.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
