name: Release

# New product version — only when you push an explicit version tag.
# Merging to main runs CI only; it does not publish a release.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Select Xcode 26
        run: |
          selected=""
          for candidate in /Applications/Xcode_26*.app /Applications/Xcode.app; do
            [[ -d "$candidate" ]] || continue
            sudo xcode-select -s "$candidate/Contents/Developer"
            major=$(xcodebuild -version | awk '/Xcode/ {split($2,a,"."); print a[1]}')
            if [[ "$major" -ge 26 ]]; then
              selected="$candidate"
              break
            fi
          done
          if [[ -z "$selected" ]]; then
            echo "No Xcode 26+ found on runner" >&2
            exit 1
          fi
          echo "Using $selected"
          xcodebuild -version
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
      - name: Install system dependencies
        run: brew install espeak-ng onnxruntime
      - name: Build release
        run: cargo build --release -p translator
      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCH="$(uname -m)"
          NAME="banyan-${VERSION}-macos-${ARCH}"
          STAGING="dist/${NAME}"
          mkdir -p dist
          rm -rf "$STAGING"
          mkdir -p "$STAGING"

          cp target/release/translator "$STAGING/"
          chmod +x "$STAGING/translator"
          cp -R web "$STAGING/"
          cp .env.example README.md "$STAGING/"
          [[ -f README.ru.md ]] && cp README.ru.md "$STAGING/"
          cp -R target/release/BanyanSpeech.app "$STAGING/"
          [[ -f target/release/banyan-translate ]] && cp target/release/banyan-translate "$STAGING/"

          printf '%s\n' \
            '#!/usr/bin/env bash' \
            'set -euo pipefail' \
            'DIR="$(cd "$(dirname "$0")" && pwd)"' \
            'export CALL_TRANSLATOR_HOME="$DIR"' \
            'export ORT_DYLIB_PATH="${ORT_DYLIB_PATH:-/opt/homebrew/lib/libonnxruntime.dylib}"' \
            'exec "$DIR/translator" "$@"' \
            > "$STAGING/run.sh"
          chmod +x "$STAGING/run.sh"

          printf '%s\n' \
            'brew install espeak-ng onnxruntime' \
            './run.sh setup' \
            './run.sh' \
            'Open http://127.0.0.1:5050' \
            > "$STAGING/INSTALL.txt"

          (cd dist && zip -r "${NAME}.zip" "${NAME}")
      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          generate_release_notes: true
          files: dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      ORT_VERSION: "1.20.1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Cache vcpkg (OpenBLAS)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            C:\vcpkg\installed\x64-windows-static
            C:\vcpkg\b\d
          key: vcpkg-openblas-static-${{ hashFiles('.github/workflows/release.yml') }}
          restore-keys: |
            vcpkg-openblas-static-

      - name: Install OpenBLAS (vcpkg)
        run: |
          vcpkg install openblas:x64-windows-static
          vcpkg integrate install
          echo "CMAKE_INCLUDE_PATH=$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows-static/include/openblas" >> $env:GITHUB_ENV
          echo "CMAKE_LIBRARY_PATH=$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows-static/lib" >> $env:GITHUB_ENV

      - name: Install espeak-ng
        run: choco install espeak-ng -y

      - name: Install ONNX Runtime
        shell: pwsh
        run: |
          $zip = "onnxruntime-win-x64-$env:ORT_VERSION.zip"
          if (-not (Test-Path "ort/onnxruntime-win-x64-$env:ORT_VERSION/lib/onnxruntime.dll")) {
            Invoke-WebRequest -Uri "https://github.com/microsoft/onnxruntime/releases/download/v$env:ORT_VERSION/$zip" -OutFile $zip
            Expand-Archive $zip -DestinationPath ort -Force
          }

      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable

      - name: Build release
        run: cargo build --release -p translator

      - name: Package
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}".Substring(1)
          $NAME = "banyan-${VERSION}-windows-x64"
          $STAGING = "dist/$NAME"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          if (Test-Path $STAGING) { Remove-Item -Recurse -Force $STAGING }
          New-Item -ItemType Directory -Force -Path $STAGING | Out-Null
          Copy-Item target/release/translator.exe $STAGING/
          Copy-Item ort/onnxruntime-win-x64-$env:ORT_VERSION/lib/onnxruntime.dll $STAGING/
          Copy-Item -Recurse web $STAGING/web
          Copy-Item .env.example, README.md $STAGING/
          if (Test-Path README.ru.md) { Copy-Item README.ru.md $STAGING/ }
          @(
            "Banyan Windows release (Windows 10/11 x64)",
            "",
            "1. Unzip to a folder",
            "2. .\translator.exe setup   (downloads models)",
            "3. .\translator.exe         then open http://127.0.0.1:5050",
            "",
            "Virtual audio for calls: VB-Audio Virtual Cable (see docs/windows.md)",
            "espeak-ng: install via choco if TTS phonemization fails"
          ) | Set-Content -Path $STAGING/WINDOWS.txt
          Compress-Archive -Path $STAGING -DestinationPath "dist/${NAME}.zip" -Force

      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          files: dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
