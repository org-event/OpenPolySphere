name: Security Audit

# CVE scanning in lockfiles — RustSec (cargo) + npm advisory DB.
# Dependabot alerts cover the same sources over time; this fails CI on known issues.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 4 * * *"

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-audit:
    name: cargo audit (RustSec)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "26"
          cache: npm
      - run: npm ci
      - name: Audit package-lock.json
        run: npm audit --audit-level=moderate
