name: Security Audit

# CVE scanning in lockfiles — RustSec (cargo) + bun advisory DB.
# Dependabot alerts cover the same sources over time; this fails CI on known issues.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 4 * * *"

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-audit:
    name: cargo audit (RustSec)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  bun-audit:
    name: bun audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Audit bun.lock
        run: bun audit
