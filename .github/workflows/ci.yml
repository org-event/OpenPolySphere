name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rustfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "26"
          cache: npm
      - run: npm ci
      - run: npm run lint:js

  macos:
    runs-on: macos-latest
    needs: [rustfmt, js]
    steps:
      - uses: actions/checkout@v5
      - name: Select Xcode 26
        run: |
          selected=""
          for candidate in /Applications/Xcode_26*.app /Applications/Xcode.app; do
            [[ -d "$candidate" ]] || continue
            sudo xcode-select -s "$candidate/Contents/Developer"
            major=$(xcodebuild -version | awk '/Xcode/ {split($2,a,"."); print a[1]}')
            if [[ "$major" -ge 26 ]]; then
              selected="$candidate"
              break
            fi
          done
          if [[ -z "$selected" ]]; then
            echo "No Xcode 26+ found on runner" >&2
            ls /Applications/Xcode*.app >&2 || true
            exit 1
          fi
          echo "Using $selected"
          xcodebuild -version
          swift --version
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/setup-node@v5
        with:
          node-version: "26"
          cache: npm
      - uses: extractions/setup-just@v4
      - name: Install system dependencies
        run: brew install espeak-ng onnxruntime
      - run: npm ci
      - run: just check
      - run: just build
      - name: Verify build
        run: |
          test -x target/release/translator
          test -d target/release/LiveTranslator.app
          ./target/release/translator --help
