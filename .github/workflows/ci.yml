name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rustfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint:js

  macos:
    runs-on: macos-14
    needs: [rustfmt, js]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: extractions/setup-just@v2
      - name: Install system dependencies
        run: brew install espeak-ng onnxruntime
      - run: npm ci
      - run: just check
      - run: just build
      - name: Verify build
        run: |
          test -x target/release/translator
          test -d target/release/LiveTranslator.app
          ./target/release/translator --help
