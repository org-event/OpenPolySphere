name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      platform:
        description: Which platform jobs to run
        required: true
        default: all
        type: choice
        options:
          - all
          - macos
          - windows

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # JS-based Actions runtime (not project Node — we use Bun). Node 26 is not on GHA yet; 24 is the current target.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      js: ${{ steps.filter.outputs.js }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.cargo/**'
            js:
              - 'web/**'
              - 'package.json'
              - 'bun.lock'
              - 'eslint.config.js'
            workflows:
              - '.github/workflows/**'
              - 'Justfile'
              - 'scripts/**'

  rustfmt:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.workflows == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  js:
    runs-on: ubuntu-latest
    needs: changes
    # macOS `just check` includes ESLint — run when Rust or web changes.
    if: |
      needs.changes.outputs.js == 'true' ||
      needs.changes.outputs.rust == 'true' ||
      needs.changes.outputs.workflows == 'true' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint:js

  macos:
    runs-on: macos-latest
    needs: [changes, rustfmt, js]
    if: |
      always() &&
      (needs.rustfmt.result == 'success' || needs.rustfmt.result == 'skipped') &&
      (needs.js.result == 'success' || needs.js.result == 'skipped') &&
      (needs.changes.outputs.rust == 'true' || needs.changes.outputs.workflows == 'true' || github.event_name == 'workflow_dispatch') &&
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' || inputs.platform == 'macos') ||
       github.event_name == 'push' ||
       (github.event_name == 'pull_request' && !contains(join(github.event.pull_request.labels.*.name, ','), 'ci/windows-only')))
    steps:
      - uses: actions/checkout@v7
      - name: Select Xcode 26
        run: |
          selected=""
          for candidate in /Applications/Xcode_26*.app /Applications/Xcode.app; do
            [[ -d "$candidate" ]] || continue
            sudo xcode-select -s "$candidate/Contents/Developer"
            major=$(xcodebuild -version | awk '/Xcode/ {split($2,a,"."); print a[1]}')
            if [[ "$major" -ge 26 ]]; then
              selected="$candidate"
              break
            fi
          done
          if [[ -z "$selected" ]]; then
            echo "No Xcode 26+ found on runner" >&2
            ls /Applications/Xcode*.app >&2 || true
            exit 1
          fi
          echo "Using $selected"
          xcodebuild -version
          swift --version
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: swatinem/rust-cache@v2
        with:
          shared-key: macos
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: oven-sh/setup-bun@v2
      - uses: extractions/setup-just@v4
      - name: Install system dependencies
        run: brew install espeak-ng onnxruntime
      - run: bun install --frozen-lockfile
      - run: just check
      - run: just build
      - name: Verify build
        run: |
          test -x target/release/translator
          test -d target/release/BanyanSpeech.app
          ./target/release/translator --help

  windows:
    runs-on: windows-latest
    needs: [changes, rustfmt, js]
    if: |
      always() &&
      (needs.rustfmt.result == 'success' || needs.rustfmt.result == 'skipped') &&
      (needs.js.result == 'success' || needs.js.result == 'skipped') &&
      (needs.changes.outputs.rust == 'true' || needs.changes.outputs.workflows == 'true' || github.event_name == 'workflow_dispatch') &&
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' || inputs.platform == 'windows') ||
       github.event_name == 'push' ||
       github.event_name == 'pull_request')
    timeout-minutes: 90
    env:
      ORT_VERSION: "1.20.1"
    steps:
      - uses: actions/checkout@v7

      - name: Cache vcpkg (OpenBLAS)
        uses: actions/cache@v4
        with:
          path: |
            C:\vcpkg\installed\x64-windows-static
            C:\vcpkg\b\d
          key: vcpkg-openblas-static-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            vcpkg-openblas-static-

      - name: Install OpenBLAS (vcpkg)
        run: |
          vcpkg install openblas:x64-windows-static
          vcpkg integrate install
          echo "CMAKE_INCLUDE_PATH=$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows-static/include/openblas" >> $env:GITHUB_ENV
          echo "CMAKE_LIBRARY_PATH=$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows-static/lib" >> $env:GITHUB_ENV

      - name: Install espeak-ng
        run: choco install espeak-ng -y

      - name: Install ONNX Runtime
        shell: pwsh
        run: |
          $zip = "onnxruntime-win-x64-$env:ORT_VERSION.zip"
          if (-not (Test-Path "ort/onnxruntime-win-x64-$env:ORT_VERSION/lib/onnxruntime.dll")) {
            Invoke-WebRequest -Uri "https://github.com/microsoft/onnxruntime/releases/download/v$env:ORT_VERSION/$zip" -OutFile $zip
            Expand-Archive $zip -DestinationPath ort -Force
          }

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: swatinem/rust-cache@v2
        with:
          shared-key: windows-msvc
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Clippy
        run: cargo clippy -p translator -p audio-core@0.1.0 --all-targets -- -D warnings

      - name: Build release
        run: cargo build --release -p translator

      - name: Verify binary
        run: .\target\release\translator.exe --help

      - name: Package artifact
        shell: pwsh
        run: |
          $dest = "dist/banyan-windows-x64"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item target/release/translator.exe $dest/
          Copy-Item ort/onnxruntime-win-x64-$env:ORT_VERSION/lib/onnxruntime.dll $dest/
          Copy-Item -Recurse web $dest/web
          Copy-Item .env.example, README.md $dest/
          @(
            "Banyan Windows CI artifact (Windows 10/11 x64)",
            "",
            "1. Unzip to a folder",
            "2. .\translator.exe --help",
            "3. .\translator.exe setup   (downloads models)",
            "4. .\translator.exe         then open http://127.0.0.1:5050",
            "",
            "Virtual audio for calls: VB-Audio Virtual Cable (see docs/windows.md)",
            "espeak-ng: install via choco if TTS phonemization fails"
          ) | Set-Content -Path $dest/WINDOWS.txt

      - uses: actions/upload-artifact@v7
        with:
          name: banyan-windows-x64
          path: dist/banyan-windows-x64
          retention-days: 14
